name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Grok API Key
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          printf 'const CONFIG = { grokApiKey: "%s" };\n' "$GROK_API_KEY" > config.js

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_WAVE_0513C0C10 }}
          action: upload
          app_location: /
          output_location: .
          skip_app_build: true
