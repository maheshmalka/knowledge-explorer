name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Get OIDC Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const core = require('@actions/core')
            return await core.getIDToken()
          result-encoding: string

      - name: Inject Grok API Key
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          printf 'const CONFIG = { grokApiKey: "%s" };\n' "$GROK_API_KEY" > config.js

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_WAVE_0513C0C10 }}
          github_id_token: ${{ steps.idtoken.outputs.result }}
          action: upload
          app_location: /
          output_location: .
          skip_app_build: true
